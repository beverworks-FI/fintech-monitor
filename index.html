function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

  let html = '<div class="highlights"><div class="highlights-title">오늘의 핵심 뉴스</div>';
  HIGHLIGHTS.forEach(h => {
    const typeClass = h.type ? ' hl-type-' + h.type : '';
    html += `<div class="highlight-card"><span class="hl-badge${typeClass}">${escapeHtml(h.type || '뉴스')}</span><div class="hl-body"><div class="hl-company">${escapeHtml(h.company)}</div><div class="hl-title">${escapeHtml(h.title)}</div><div class="hl-summary">${escapeHtml(h.summary || '')}</div></div></div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  Object.entries(COMPANIES).forEach(([cat, list]) => {
    const t = document.createElement('div');
    t.className = 'tab' + (cat === activeTab ? ' active' : '');
    t.innerHTML = escapeHtml(cat) + '<span class="badge">' + list.length + '</span>';
    t.onclick = () => { activeTab = cat; renderTabs(); renderContent(); };
    tabsEl.appendChild(t);
  });
  const all = document.createElement('div');
  all.className = 'tab' + (activeTab === '전체' ? ' active' : '');
  all.innerHTML = '전체<span class="badge">' + allCompanies.length + '</span>';
  all.onclick = () => { activeTab = '전체'; renderTabs(); renderContent(); };
  tabsEl.appendChild(all);
}

function renderContent(filter) {
  const el = document.getElementById('content');
  const companies = activeTab === '전체' ? allCompanies : COMPANIES[activeTab] || [];
  const filtered = filter ? companies.filter(c =>
    c.name.toLowerCase().includes(filter) ||
    c.desc.toLowerCase().includes(filter) ||
    c.tags.some(t => t.toLowerCase().includes(filter)) ||
    (NEWS_DATA[c.name] || []).some(n => n.title.toLowerCase().includes(filter) || (n.summary||'').toLowerCase().includes(filter))
  ) : companies;
  let html = '';
  filtered.forEach(c => {
    const news = NEWS_DATA[c.name] || [];
    const newsCountHtml = news.length > 0 ? `<span class="news-count">${news.length}건</span>` : '';
    html += `<div class="company-card"><div class="card-header"><div class="card-name">${escapeHtml(c.name)}${newsCountHtml}</div><span class="card-type ${TYPE_CLASS[c.type]}">${TYPE_LABELS[c.type]}</span></div><div class="card-desc">${escapeHtml(c.desc)}</div><div class="card-tags">${c.tags.map(t => '<span class="tag">#' + escapeHtml(t) + '</span>').join('')}</div>`;
    if (news.length > 0) {
      html += '<div class="news-section">';
      news.forEach(n => {
        const titleHtml = n.url ? `<a href="${escapeHtml(n.url)}" target="_blank" rel="noopener">${escapeHtml(n.title)}</a>` : escapeHtml(n.title);
        html += `<div class="news-item"><div class="ni-title">${titleHtml}</div>${n.summary ? '<div class="ni-summary">' + escapeHtml(n.summary) + '</div>' : ''}<div class="ni-meta">${escapeHtml(n.source || '')} ${n.date ? '· ' + escapeHtml(n.date) : ''}</div></div>`;
      });
      html += '</div>';
    } else {
      html += '<div class="no-news">최근 특이사항 없음</div>';
    }
    html += '</div>';
  });
  if (filtered.length === 0) html = '<div class="no-data">검색 결과가 없습니다</div>';
  el.innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input', function(e) {
  renderContent(e.target.value.toLowerCase());
});

renderHighlights();
renderTabs();
renderContent();
</script>
</body>
</html>
